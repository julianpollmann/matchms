name: Test ecosystem

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag for manually running CI first code check workflow
        required: False
        default: ''

jobs:
  test_ecosystem:
    name: Test ecosystem / python-3.11 / numpy-${{ matrix.numpy-version }} / ${{ matrix.dependent-packages }} / ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        numpy-version: [ 1.25, 2.1 ]
        dependent-packages: [ 'ms2deepscore', 'ms2query', 'spec2vec' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependent packages
        run: |
          python -m pip install --upgrade pip poetry
          pip install numpy==${{ matrix.numpy-version }}
          pip install ${{ matrix.dependent-packages }}
          pip install .
          pip check

      - name: Show pip list
        run: |
          pip list

#      - name: Generate Badge URLs
#        run: |
#          echo "![Build: python-3.11 / numpy-${{ matrix.numpy-version }} / ${{ matrix.dependent-packages }}](https://github.com/${{ github.repository }}/actions/workflows/${{ github.workflow }}/badge.svg?branch=${{ github.ref_name }}&numpy=${{ matrix.numpy-version }}&package=${{ matrix.dependent-packages }})" >> badges.md
