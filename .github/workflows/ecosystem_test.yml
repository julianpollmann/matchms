name: Test ecosystem

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag for manually running CI first code check workflow
        required: False
        default: ''

jobs:
  test_ecosystem:
    name: Test ecosystem / python-3.11 / numpy-${{ matrix.numpy-version }} / ${{ matrix.dependend-packages }} / ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        numpy-version: [ 1.25, 2.1 ]
        dependent-packages: [ 'ms2deepscore', 'ms2query', 'spec2vec' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependent packages
        run: |
          python -m pip install --upgrade pip poetry
          pip install numpy==${{ matrix.numpy-version }}
          pip install ${{ matrix.dependent-packages }}
          pip install .
          pip check

      - name: Show pip list
        run: |
          pip list

      - name: Generate status badge
        id: badge
        run: |
          echo "Generating badge for numpy-${{ matrix.numpy-version }} / ${{ matrix.dependent-packages }}"
          echo "https://img.shields.io/badge/matchms-numpy-${{ matrix.numpy-version }}-${{ matrix.dependent-packages }}-green" > badge-numpy-${{ matrix.numpy-version }}-${{ matrix.dependent-packages }}.svg

      - name: Upload badge
        uses: actions/upload-artifact@v4
        with:
          name: badge-numpy-${{ matrix.numpy-version }}-${{ matrix.dependent-packages }}
          path: badge-numpy-${{ matrix.numpy-version }}-${{ matrix.dependent-packages }}.svg
