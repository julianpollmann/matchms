  test_ecosystem:
    name: Test ecosystem / python-3.10 / numpy-${{ matrix.numpy-version }} /  ecosystem-${{ matrix.dependend-packages }} / ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        numpy-version: [1.25, 2.0]
        dependend-packages: [ 'spec2vec' ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build package and create dev environment
        run: |
          python -m pip install --upgrade pip poetry
          pip install ${{ matrix.dependend-packages }}
          pip install .
          pip check
#          poetry add numpy==${{ matrix.numpy-version }}
#          poetry add ${{ matrix.dependend-packages }}
#          poetry install

      - name: Show pip list
        run: |
          pip list
