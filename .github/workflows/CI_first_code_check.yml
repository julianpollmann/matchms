  test_ecosystem:
    name: Test ecosystem / python-3.10 / numpy-${{ matrix.numpy-version }} /  ecosystem-${{ matrix.dependend-packages }} / ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        numpy-version: [1.24, 2.0]
        dependend-packages: [ 'spec2vec' ]
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

